<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Men's Jackets | RainyDays</title>
    <link rel="stylesheet" href="../../src/css/styles.css" />

<body>
    <header>
    <div class="container header-bar">

      <!-- Mobile menu -->
      <details class="mobile-nav">
        <summary class="nav-toggle" aria-label="Open menu">☰</summary>

        <nav class="mobile-nav-panel" aria-label="Mobile navigation">
          <a href="../../index.html">Home</a>
          <a href="../products.html">Products</a>
          <a href="../coming-soon.html">About</a>
          <a href="../coming-soon.html">Login</a>
          <a href="../coming-soon.html">Register</a>
        </nav>
      </details>

      <!-- Logo -->
      <a href="../../index.html" class="logo-link">
        <img src="../../assets/images/RainyDays_Logo.png" alt="RainyDays Logo" />
      </a>

      <!-- Desktop navigation -->
      <nav class="desktop-nav" aria-label="Primary">
        <ul class="nav-list">
          <li><a href="../../index.html">Home</a></li>
          <li class="nav-dropdown">
            <a class="active" href="../products.html">Products</a>
              <div class="dropdown-menu">
                <a href="../products.html">All jackets</a>
                <a href="mens.html">Men's jackets</a>
                <a href="womens.html">Women's jackets</a>
              </div>
          </li>
          <li><a href="../coming-soon.html">About</a></li>
        </ul>
      </nav>

      <!-- Cart -->
      <a href="../checkout.html" class="cart-link" aria-label="Shopping cart">
        <img src="../../assets/images/icons8-shopping-cart-64.png" alt="" />
        <span class="cart-badge" aria-hidden="true">0</span>
      </a>

      <!-- Desktop auth -->
      <div class="auth-links">
        <a href="../coming-soon.html">Login</a>
        <span aria-hidden="true">|</span>
        <a href="../coming-soon.html">Register</a>
      </div>
    </div>
  </header>
  
  <main class="products-page">
    <section class="products container">
      <h1 class="products-page-title">Men's Jackets</h1>
      <div class="product-tools">
        <div class="product-filters">
          <button class="filter-button" data-gender="all" type="button">All</button>
          <button class="filter-button" data-gender="Male" type="button">Men</button>
          <button class="filter-button" data-gender="Female" type="button">Women</button>
        </div>
        <div class="product-search-wrap">
          <label for="product-search" class="search-label">Search jackets</label>
          <input type="search" id="product-search" class="product-search" placeholder="Thunderbolt jacket">
        </div>
      </div>
      <div class="product-grid" data-category-gender="Male">
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
        <div class="footer-links">
            <a href="../terms.html">Terms and Conditions</a>
            <a href="../privacy.html">Privacy Policy</a>
        </div>
      <p class="footer-copy">© 2025 Rainydays AS. All rights reserved.</p>
